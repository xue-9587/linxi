<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="Keywords" content="林熙导航网,林熙网址收录,在线工具,林熙资源网,林熙blog,林熙影院,林熙在线工具,林熙图库,林熙音乐试听网,林熙博客"/>
    <meta name="description" content="林熙导航网，免费收录实用网址大全！"/>
    <title>免费在线互动影游编辑器</title>
    <link href="/favicon.ico" rel="icon">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== Top Toolbar ===== -->
  <header id="toolbar">
    <div class="tb-group tb-logo">
      <img class="logo-img" src="https://img10.360buyimg.com/imgzone/jfs/t1/477098/40/7927/2837/6a52f95fF557a4754/00831c2032cebb4d.png" alt="互动影游编辑器" />
    </div>
    <div class="tb-group tb-proj">
      <input id="projectName" class="proj-name" type="text" value="未命名作品" title="作品名称" placeholder="未命名作品" />
    </div>
    <div class="tb-group tb-ad">
      <a class="ad-slot" data-ad="0" title="广告位（点击跳转）" href="#">
        <img class="ad-img" alt="" />
        <span class="ad-ph">广告位 1</span>
      </a>
      <a class="ad-slot" data-ad="1" title="广告位（点击跳转）" href="#">
        <img class="ad-img" alt="" />
        <span class="ad-ph">广告位 2</span>
      </a>
    </div>
    <div class="tb-group" style="margin-left:auto">
      <button id="btnAddScene" class="btn"> <i class="fa-solid fa-plus"></i> 场景</button>
      <button id="btnVars" class="btn"><i class="fa-brands fa-hornbill"></i> 变量</button>
      <button id="btnPlay" class="btn primary"> <i class="fa-solid fa-play"></i> 试玩</button>
      <button id="btnExportPlayer" class="btn accent"> <i class="fa-solid fa-download" style="color: rgb(177, 151, 252);"></i> 导出成品</button>
    </div>
    <div class="tb-group">
      <button id="btnNew" class="btn">新建</button>
      <button id="btnOpen" class="btn">打开</button>
      <button id="btnSave" class="btn">保存</button>
      <button id="btnExport" class="btn">导出</button>
      <button id="btnImport" class="btn">导入</button>
      <input id="fileInput" type="file" accept="application/json" hidden />
    </div>
    <div class="tb-group">
      <button id="btnZoomOut" class="btn icon" title="缩小">━</button>
      <span id="zoomLabel" class="zoom-label">100%</span>
      <button id="btnZoomIn" class="btn icon" title="放大"> <i class="fa-solid fa-plus"></i> </button>
      <button id="btnZoomFit" class="btn" title="居中视图"><i class="fa-solid fa-down-left-and-up-right-to-center"></i></button>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main id="layout">
    <!-- Left: scene outline -->
    <aside id="outline">
      <div class="panel-title">场景事件列表 <span id="sceneCount" class="badge">0</span></div>
      <ul id="sceneList"></ul>
      <div class="hint">📢：有问题请联系QQ：1845637745</div>
    </aside>

    <!-- Center: canvas -->
    <section id="canvasWrap">
      <div id="canvas">
        <div id="world">
          <svg id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="nodes"></div>
        </div>
      </div>
      <div id="miniStatus" class="mini-status"></div>
    </section>

    <!-- Right: properties -->
    <aside id="props">
      <div class="panel-title">属性</div>
      <div id="propBody" class="prop-body">
        <div class="empty-tip">选择一个场景节点以编辑其属性。</div>
      </div>
    </aside>
  </main>

  <!-- ===== Play overlay ===== -->
  <div id="playOverlay" class="play-overlay hidden">
    <div id="playStage" class="play-stage">
      <div id="playAds" class="play-ads">
        <a class="play-ad" data-ad="0" target="_blank" rel="noopener noreferrer"></a>
        <a class="play-ad" data-ad="1" target="_blank" rel="noopener noreferrer"></a>
      </div>
      <div id="playCenter">
        <div id="playMedia" class="play-media">
          <div id="playMediaBox" class="play-media-box"></div>
          <div id="playChars" class="play-chars"></div>
          <div id="playState" class="play-state"></div>
          <div id="playCaption" class="play-caption">
            <div id="playSpeaker" class="play-speaker"></div>
            <div id="playText" class="play-text"></div>
          </div>
        </div>
        <div id="playDock" class="play-dock">
          <div id="playAudio" class="play-audio hidden"></div>
          <div id="playVideoCtl" class="play-video-ctl hidden">
            <button id="playReplayVid" class="btn"><i class="fa-solid fa-arrows-rotate"></i> 重播视频</button>
          </div>
          <div id="playChoices" class="play-choices"></div>
          <div class="play-controls">
            <button id="playBack" class="btn">&larr; 返回</button>
            <button id="playRestart" class="btn">&#8635; 重玩</button>
            <button id="playExit" class="btn danger">&#10005; 结束</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Variables modal ===== -->
  <div id="varModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <span><i class="fa-brands fa-hornbill"></i> 变量 / 旗标</span>
        <button id="varClose" class="modal-x" title="关闭">✕</button>
      </div>
      <div class="modal-sub">定义全局变量，用于让选项「设置数值 / 开关 / 文本」，并按条件决定是否出现。</div>
      <div id="varList" class="var-list"></div>
      <div class="var-add">
        <input id="newVarName" type="text" placeholder="变量名（如：信任）" />
        <select id="newVarType">
          <option value="number">数值</option>
          <option value="bool">开关</option>
          <option value="text">文本</option>
        </select>
        <input id="newVarInit" type="text" placeholder="初始值" value="0" />
        <button id="addVar" class="btn primary"><i class="fa-solid fa-plus"></i>  增加</button>
      </div>
      <div class="modal-foot">
        <span class="modal-tip">删除变量会同时清理引用它的选项效果与条件。</span>
        <button id="varDone" class="btn primary">完成</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
